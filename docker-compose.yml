services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: comprafacil
      POSTGRES_PASSWORD: comprafacil_secret
      POSTGRES_DB: comprafacil
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comprafacil -d comprafacil"]
      interval: 5s
      timeout: 5s
      retries: 8

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./api:/api
      - api_node_modules:/api/node_modules
    command:
      - sh
      - -c
      - |
        if [ ! -d node_modules ]; then npm install; fi
        exec npm start
    environment:
      - DATABASE_URL=postgresql://comprafacil:comprafacil_secret@postgres:5432/comprafacil
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command:
      - sh
      - -c
      - |
        if [ ! -f node_modules/.bin/vite ]; then npm ci; fi
        exec npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_PROXY_TARGET=http://api:3001
    depends_on:
      - api
    stdin_open: true
    tty: true

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8080:80"
    depends_on:
      - api
    environment:
      - API_UPSTREAM=api:3001
    profiles:
      - prod

volumes:
  node_modules:
  pgdata:
  api_node_modules:
